name: Bug report
description: Report a reproducible problem.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the problem.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, deployment mode
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

