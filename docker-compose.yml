services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tsudolio
      POSTGRES_USER: tsudolio
      POSTGRES_PASSWORD: tsudolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsudolio -d tsudolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tsudolio
      MINIO_ROOT_PASSWORD: change-me-in-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  minio-data:
